model:
    name: qwen_image
    pretrained_model_name_or_path: /data/nvme1/models/Qwen/Qwen-Image-2512
    max_sequence_length: 1024
    running_dtype: bf16

data:
    val:
        name: image_dataset
        num_workers: 8
        image_size: 1024
        shuffle: false
        data_path:
            - /data/nvme1/yongyang/kkk/LightX2V_train_data_examples/dataset_v1/val.jsonl

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: logitnormal
    logitnormal_mean: 0.0
    logitnormal_std: 1.0
    min_t: 0.001
    max_t: 1.0
    do_time_shift: true
    time_shift_mu: 5.0
    time_shift_power: 1.0

inference:
    method: image_infer  # image_infer, image_native_infer
    negative_prompt: " "
    width: 1024
    height: 1024
    num_inference_steps: 50
    enable_cfg: true
    cfg_guidance_scale: 4.0
    seed: 42
    output_dir: ./output_infer/qwen_image_lora_test3
    lora_config:
        path: /data/nvme1/yongyang/kkk/LightX2V/lightx2v_train/output_train/qwen_image_lora/checkpoint-000001000/pytorch_lora_weights.safetensors
