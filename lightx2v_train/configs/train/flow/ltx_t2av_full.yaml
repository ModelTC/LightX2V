model:
    name: ltx_t2av
    pretrained_model_name_or_path: /data/nvme4/models/ltx-2.3/ltx-2.3-22b-dev.safetensors
    running_dtype: bf16
    transformer_param_dtype: bf16
    embeddings_dtype: bf16
    load_transformer: true
    load_embeddings_processor: true

distributed:
    backend: nccl
    timeout_minutes: 60
    sequence_parallel:
        enabled: false
        size: 1
    fsdp2:
        enabled: true
        size: ${oc.env:WORLD_SIZE,1}
        reshard_after_forward:
            root_reshard: false
            block_reshard: true
        mixed_precision:
            param_dtype: bf16
            reduce_dtype: fp32
            output_dtype: null
            cast_forward_inputs: false

data:
    train:
        name: latent_dataset
        data_path: /data/nvme2/gushiqiao/datatets/lightx2v_ltx_t2av/.precomputed/metadata.jsonl
        dataset_repeat: 1
        batch_size: 1
        num_workers: 4
        pin_memory: true
        shuffle: true
scheduler:
    num_train_timesteps: 1000
    timestep_distribution: shifted_logit_normal
    logitnormal_std: 1.0
    logitnormal_eps: 0.001
    logitnormal_uniform_prob: 0.1

training:
    method: ltx_t2av_flow
    train_type: full
    max_train_iters: 3000
    gradient_accumulation_iters: 2
    gradient_checkpointing: true
    max_grad_norm: 1.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 100
    save_total_limit: 10
    ltx2:
        default_fps: 24
        video_loss_weight: 1.0
        audio_loss_weight: 1.0
    optimizer:
        learning_rate: 0.000001
        adam_beta1: 0.9
        adam_beta2: 0.999
        weight_decay: 0.01
        adam_epsilon: 0.00000001
    output_dir: ./output_train/ltx_t2av_full

inference:
    method: none
    infer_every_iters: null

logging:
    rank_zero_only: true
    train_log_every_iters: 10

resume:
    auto_resume: false
