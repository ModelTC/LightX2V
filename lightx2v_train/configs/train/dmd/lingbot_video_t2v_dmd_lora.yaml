model:
    name: lingbot_video
    pretrained_model_name_or_path: /data/nvme5/gushiqiao/models/lingbot-video-moe-30b-a3b
    running_dtype: bf16
    transformer_param_dtype: bf16
    text_encoder_dtype: bf16
    vae_dtype: fp32
    text_encoder_cpu: false
    max_sequence_length: 37698
    load_transformer: true
    load_text_encoder: true
    load_vae: true
    fake:
        name: lingbot_video
        pretrained_model_name_or_path: ${model.pretrained_model_name_or_path}
    teacher:
        name: lingbot_video
        pretrained_model_name_or_path: ${model.pretrained_model_name_or_path}

distributed:
    backend: nccl
    timeout_minutes: 120
    sequence_parallel:
        enabled: false
        size: 1
    fsdp2:
        enabled: true
        size: ${oc.env:WORLD_SIZE,1}
        reshard_after_forward:
            root_reshard: false
            block_reshard: true
        mixed_precision:
            param_dtype: null
            reduce_dtype: fp32
            output_dtype: null
            cast_forward_inputs: false

data:
    train:
        name: prompt_dataset
        data_path: /data/nvme5/gushiqiao/datatets/lingbot_video/vidprom_filtered_extended_first5k_auto_negative.jsonl
        batch_size: 1
        num_workers: 4
        pin_memory: true
        shuffle: true
        drop_last: true
    val:
        name: prompt_dataset
        data_path: /data/nvme5/gushiqiao/codes/new/LightX2V/lightx2v_train/assets/lingbot_video/t2v_prompts_first5.json
        max_samples: 1
        batch_size: 1
        num_workers: 0
        pin_memory: true
        shuffle: false
        drop_last: false

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: uniform
    min_t: 0.001
    max_t: 1.0
    time_shift_settings:
        do_time_shift: true
        shift_type: linear
        time_shift_mu: 3.0
        time_shift_power: 1.0
        sigma_min: 0.0
        extra_one_step: true

training:
    method: lingbot_video_dmd
    max_train_iters: 5000
    gradient_accumulation_iters: 4
    gradient_checkpointing: true
    max_grad_norm: 1.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 100
    save_total_limit: 10
    dmd:
        num_inference_steps: 4
        fake_update_ratio: 5
        height: 480
        width: 832
        num_frames: 121
        denoising_step_list: [1000, 750, 500, 250]
        warp_denoising_step: true
        ts_schedule: false
        ts_schedule_max: false
        num_train_timestep: 1000
        timestep_shift: 3.0
        min_score_timestep: 0
        min_step_ratio: 0.02
        max_step_ratio: 0.98
    student:
        train_type: lora
        lora:
            rank: 128
            alpha: 128
            target_modules: [to_q, to_k, to_v, to_out, gate_proj, up_proj, down_proj]
        optimizer:
            learning_rate: 0.0001
            adam_beta1: 0.9
            adam_beta2: 0.999
            weight_decay: 0.001
            adam_epsilon: 0.00000001
    fake:
        train_type: lora
        lora:
            rank: 128
            alpha: 128
            target_modules: [to_q, to_k, to_v, to_out, gate_proj, up_proj, down_proj]
        optimizer:
            learning_rate: 0.00002
            adam_beta1: 0.9
            adam_beta2: 0.999
            weight_decay: 0.001
            adam_epsilon: 0.00000001
    teacher:
        guidance_scale: 3.0
        cfg_norm: none
    output_dir: /data/nvme6/gushiqiao/x2v_train_save/lingbot_video_t2v_dmd_attn_ffn_lora_121f

inference:
    method: lingbot_video_t2v_infer
    scheduler_type: euler
    default_width: 832
    default_height: 480
    num_frames: 121
    num_inference_steps: 4
    denoising_step_list: [1000, 750, 500, 250]
    warp_denoising_step: true
    enable_cfg: false
    cfg_guidance_scale: 1.0
    shift: 3.0
    fps: 24
    seed: 42
    output_dir: ${training.output_dir}/inference
    infer_every_iters: ${training.save_every_iters}

logging:
    rank_zero_only: true
    train_log_every_iters: 10

resume:
    auto_resume: false
