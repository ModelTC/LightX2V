model:
    name: wan_ti2v_5b_ar
    pretrained_model_name_or_path: /path/to/models/wan2.2/Wan2.2-TI2V-5B
    latent_channels: 48
    max_sequence_length: 512
    running_dtype: bf16
    transformer_param_dtype: fp32
    vae_dtype: fp32
    t5_dtype: bf16
    t5_cpu: false
    load_vae: true
    load_text_encoder: true
    load_transformer: true
    num_frame_per_chunk: 8
    local_attn_size: 32
    defer_kv_cache_updates: true
    detach_kv_cache_updates: false
    sink_size: 8
    vae_stride:
        - 4
        - 16
        - 16
    patch_size:
        - 1
        - 2
        - 2
    fake:
        name: wan_ti2v_5b
        pretrained_model_name_or_path: /path/to/models/wan2.2/Wan2.2-TI2V-5B
        transformer_param_dtype: bf16
    teacher:
        name: wan_ti2v_5b
        pretrained_model_name_or_path: /path/to/models/wan2.2/Wan2.2-TI2V-5B
        transformer_param_dtype: bf16
    student:
        checkpoint_path: /path/to/LightX2V/lightx2v_train/output_train/wan2_2_ti2v_5b_tf_cache_96f_sp4/checkpoint-000005000
        checkpoint_strict: true

distributed:
    backend: nccl
    timeout_minutes: 60
    sequence_parallel:
        enabled: false
        size: 1
    fsdp2:
        enabled: true
        size: 4
        reshard_after_forward:
            root_reshard: false
            block_reshard: true
        mixed_precision:
            param_dtype: bf16
            reduce_dtype: fp32
            output_dtype: null
            cast_forward_inputs: false

data:
    train:
        name: prompt_dataset
        data_path:
            - /path/to/prompts/vidprom_filtered_extended.txt
        batch_size: 1
        num_workers: 8
        pin_memory: true
        shuffle: true
        drop_last: true
    val:
        name: prompt_dataset
        data_path:
            - /path/to/prompts/wan_t2v_prompts.txt
        max_samples: 1
        batch_size: 1
        num_workers: 0
        pin_memory: true
        shuffle: false

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: uniform
    min_t: 0.001
    max_t: 1.0
    time_shift_settings:
        do_time_shift: true
        shift_type: linear
        time_shift_mu: 5.0
        time_shift_power: 1.0
        sigma_min: 0.0
        extra_one_step: true

training:
    method: video_ar_dmd
    max_train_iters: 5000
    gradient_accumulation_iters: 4
    gradient_checkpointing: true
    max_grad_norm: 10.0
    lr_scheduler: constant
    lr_warmup_iters: 0
    save_every_iters: 100
    save_total_limit: 2
    save_consolidated_student: true
    dmd:
        num_inference_steps: 4
        fake_update_ratio: 5
        height: 704
        width: 1280
        num_frames: 125
        denoising_step_list:
            - 1000
            - 750
            - 500
            - 250
        warp_denoising_step: true
        ts_schedule: false
        ts_schedule_max: false
        num_train_timestep: 1000
        timestep_shift: 5.0
        min_score_timestep: 0
        min_step_ratio: 0.02
        max_step_ratio: 0.98
        same_step_across_blocks: true
        sp_cache: true
        num_frame_per_chunk: 8
        context_noise: 0
        renoise_sigma_min: 0.02
        renoise_sigma_max: 0.98
        renoise_discrete_samples: 1000
        renoise_shift: 5.0
    student:
        train_type: full
        optimizer:
            learning_rate: 0.000002
            adam_beta1: 0.0
            adam_beta2: 0.999
            weight_decay: 0.01
            adam_epsilon: 0.00000001
    fake:
        train_type: full
        optimizer:
            learning_rate: 0.0000004
            adam_beta1: 0.0
            adam_beta2: 0.999
            weight_decay: 0.01
            adam_epsilon: 0.00000001
    teacher:
        guidance_scale: 3.0
        cfg_norm: none
    output_dir: ./output_train4/wan2_2_ti2v_5b_ar_dmd

inference:
    method: wan_ti2v_5b_ar_infer
    default_width: 1280
    default_height: 704
    num_frames: 125
    num_inference_steps: 4
    denoising_step_list:
        - 1000
        - 750
        - 500
        - 250
    warp_denoising_step: true
    fps: 24
    enable_cfg: false
    cfg_guidance_scale: 1.0
    seed: 42
    save_latents_only: false
    output_dir: ./output_infer4/wan2_2_ti2v_5b_ar_dmd
    infer_every_iters: ${training.save_every_iters}

logging:
    rank_zero_only: true
    train_log_every_iters: 10
    infer_log_every_steps: 10

resume:
    auto_resume: true
