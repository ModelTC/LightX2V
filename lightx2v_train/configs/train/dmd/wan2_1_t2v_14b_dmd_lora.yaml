model:
    name: wan_t2v_14b
    pretrained_model_name_or_path: /path/to/models/Wan2.1-T2V-14B/
    max_sequence_length: 512
    running_dtype: bf16
    transformer_param_dtype: fp32
    vae_dtype: fp32
    load_vae: true
    load_text_encoder: true
    load_transformer: true
    fake:
        name: wan_t2v_14b
        pretrained_model_name_or_path: /path/to/models/Wan2.1-T2V-14B/
    teacher:
        name: wan_t2v_14b
        pretrained_model_name_or_path: /path/to/models/Wan2.1-T2V-14B/
        transformer_param_dtype: bf16

distributed:
    backend: nccl
    timeout_minutes: 60
    sequence_parallel:
        enabled: false
        size: 1
    fsdp2:
        enabled: true
        size: ${oc.env:WORLD_SIZE,1}
        reshard_after_forward:
            root_reshard: false
            block_reshard: true
        mixed_precision:
            param_dtype: bf16
            reduce_dtype: fp32
            output_dtype: null
            cast_forward_inputs: false

data:
    train:
        name: prompt_dataset
        data_path:
            - /path/to/prompts/vidprom_filtered_extended.txt
        batch_size: 1
        num_workers: 8
        pin_memory: true
        shuffle: true
        drop_last: true
    val:
        name: prompt_dataset
        data_path:
            - /path/to/prompts/wan_t2v_prompts.txt
        max_samples: 1
        batch_size: 1
        num_workers: 0
        shuffle: false

scheduler:
    num_train_timesteps: 1000
    timestep_distribution: uniform
    min_t: 0.001
    max_t: 1.0
    time_shift_settings:
        do_time_shift: true
        shift_type: linear
        time_shift_mu: 5.0
        time_shift_power: 1.0
        sigma_min: 0.0
        extra_one_step: true

training:
    method: video_dmd
    max_train_iters: 5000
    gradient_accumulation_iters: 4
    gradient_checkpointing: true
    max_grad_norm: 10.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 100
    save_total_limit: 2
    dmd:
        num_inference_steps: 4
        fake_update_ratio: 5
        height: 480
        width: 832
        num_frames: 81
        denoising_step_list:
            - 1000
            - 750
            - 500
            - 250
        warp_denoising_step: true
        ts_schedule: false
        ts_schedule_max: false
        num_train_timestep: 1000
        timestep_shift: 5.0
        min_score_timestep: 0
        min_step_ratio: 0.02
        max_step_ratio: 0.98
    student:
        train_type: lora
        lora:
            rank: 64
            alpha: 64
            target_modules:
                - q
                - k
                - v
                - o
                - ffn.0
                - ffn.2
        optimizer:
            learning_rate: 0.0001
            adam_beta1: 0.9
            adam_beta2: 0.999
            weight_decay: 0.001
            adam_epsilon: 0.00000001
    fake:
        train_type: lora
        lora:
            rank: 64
            alpha: 64
            target_modules:
                - q
                - k
                - v
                - o
                - ffn.0
                - ffn.2
        optimizer:
            learning_rate: 0.00002
            adam_beta1: 0.9
            adam_beta2: 0.999
            weight_decay: 0.001
            adam_epsilon: 0.00000001
    teacher:
        guidance_scale: 3.0
        cfg_norm: none
    output_dir: ./output_train/wan2_1_t2v_14b_dmd_lora

inference:
    method: wan_t2v_14b_infer
    default_width: 832
    default_height: 480
    num_frames: 81
    num_inference_steps: 4
    denoising_step_list:
        - 1000
        - 750
        - 500
        - 250
    warp_denoising_step: true
    fps: 16
    enable_cfg: false
    cfg_guidance_scale: 1.0
    seed: 42
    output_dir: ./output_infer/wan2_1_t2v_14b_dmd_lora
    infer_every_iters: ${training.save_every_iters}

logging:
    rank_zero_only: true
    train_log_every_iters: 10
    infer_log_every_steps: 10

resume:
    auto_resume: false
